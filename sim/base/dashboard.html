<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8">
    <title>AquaTeck Base Simulator</title>
    <link rel="icon" href="/aquateck-simulator/imgs/aquateck.png">
    <link rel="stylesheet" href="style.css">
    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  </head>
  
  <body>
  
    <h1>AquaTeck Base Simulator</h1>
  
    <!-- 🎮 CONTROLS -->
    <div class="controls">
      <label>Seizoen:</label>
      <select id="season">
        <option value="zomer">Zomer</option>
        <option value="winter">Winter</option>
      </select>
  
      <label>Weer:</label>
      <select id="weather">
        <option value="calm">Kalm</option>
        <option value="wind">Wind</option>
        <option value="storm">Storm</option>
      </select>

      <button onclick="window.location.href='settings.html'">Settings</button>
    </div>
  
    <!-- 📊 DATA -->
    <div class="grid">
      <div>🚤 Snelheid: <span id="speed"></span> kn</div>
      <div>📻 VHF: <span id="vhf"></span></div>
      <div>📍 Locatie: <span id="location"></div>
    </div>
  
    <!-- 🗺️ KAART -->
    <div id="map"></div>
  
    <script type="module" src="js/app.js"></script>
  
  </body>
</html>
