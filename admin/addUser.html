<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>AquaSim - Add User</title>
    <link rel="stylesheet" href="/aquateck-simulator/css/style.css"/>
    <link rel="icon" type="image/png" href="/aquateck-simulator/imgs/aquateck.png"/>
  </head>
  <body>
    <h1>Add new user</h1>
    <form id="customerForm">
      <label>Name</label>
      <input type="text" id="name" required>

      <label>Email</label>
      <input type="email" id="email" required>

      <label>Company</label>
      <input type="company" id="company" optional>

      <label>Email</label>
      <select id="simulator" required>
        <option value="">-- Kies simulator --</option>
        <option value="base">Base</option>
        <option value="pro">Pro</option>
        <option value="fleetlink">Fleet Link</option>
        <option value="portguard">Port Guard</option>
        <option value="fleetcommand">Fleet Command</option>
      </select>

      <button type="submit">Add user</button>
    </form>

    <p id="melding"></p>

    <script type="module" src="/aquateck-simulator/js/addCustomer.js"></script>
  </body>
</html>
